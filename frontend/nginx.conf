server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy: all /api/ requests go to the backend container.
  # This makes frontend and API same-origin — no CORS, no cookie issues.
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_read_timeout 300s;
    client_max_body_size 100m;
  }

  # SPA fallback: any route not mapping to a static file returns index.html
  # so React Router can handle the path on the client.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (hashed filenames from Vite build).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache index.html — hashed assets take care of busting stale caches.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Light hardening: hide nginx version in headers.
  server_tokens off;
}
