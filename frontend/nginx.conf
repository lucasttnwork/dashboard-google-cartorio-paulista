server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any route not mapping to a static file returns index.html
  # so React Router can handle the path on the client.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (hashed filenames from Vite build).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache index.html — hashed assets take care of busting stale caches.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Light hardening: hide nginx version in headers.
  server_tokens off;
}
